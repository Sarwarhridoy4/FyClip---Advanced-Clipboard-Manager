version: 2
updates:
  # Update Go modules (your Fyne, Go libs, etc.)
  - package-ecosystem: "gomod"
    directory: "/"         # Path where go.mod exists
    schedule:
      interval: "daily"
    

  # Optional: Update GitHub Actions if your project uses them
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
