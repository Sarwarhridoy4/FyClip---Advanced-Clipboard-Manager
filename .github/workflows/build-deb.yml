name: Build Debian Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential debhelper dpkg-dev libgl1-mesa-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl-dev libxxf86vm-dev libxkbcommon-dev libwayland-dev libxkbcommon-x11-dev libx11-dev libxext-dev libxrender-dev libxfixes-dev libxss-dev libxtst-dev libasound2-dev libpulse-dev
        
    - name: Get version from tag
      id: get_version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        else
          echo "version=2.2.0" >> $GITHUB_OUTPUT
        fi
        
    - name: Build Debian package
      run: |
        ./build-deb.sh ${{ steps.get_version.outputs.version }}
        
    - name: Upload Debian package artifact
      uses: actions/upload-artifact@v4
      with:
        name: fyclip-deb-${{ steps.get_version.outputs.version }}
        path: dist/*.deb
        if-no-files-found: error
        
    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.deb
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
